<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoParts24 - Магазин №2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .content {
            padding: 40px;
        }
        .info-block {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-block h3 {
            color: #f5576c;
            margin-bottom: 10px;
        }
        .product {
            border-top: 2px solid #e0e0e0;
            padding-top: 20px;
            margin-top: 20px;
        }
        .product h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .price {
            font-size: 28px;
            color: #e67e22;
            font-weight: bold;
            margin: 15px 0;
        }
        .btn {
            display: inline-block;
            background: #f5576c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e03a50;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> AutoParts24</h1>
            <p>Низкие цены, высокое качество</p>
        </div>
        <div class="content">
            <div class="info-block">
                <h3>📍 Адрес</h3>
                <p>г. Астана, пр. Абая, 25</p>
                <h3>📞 Телефон</h3>
                <p>+7 (701) 234-56-78</p>
                <h3>🕒 Режим работы</h3>
                <p>Ежедневно: 10:00 - 20:00</p>
            </div>
            <div class="product">
                <h2>Тормозные колодки</h2>
                <p>OEM: 67890B</p>
                <p>Высокое качество, износостойкость</p>
                <div class="price">12 000 </div>
                <button class="btn" onclick="alert('Товар добавлен в корзину!')">Купить</button>
            </div>
        </div>
        <div class="footer">
        </div>
    </div>
</body>
</html>
